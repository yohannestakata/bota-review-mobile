name: PR preview

# Every PR against main produces an internal-distribution build testers can install.
on:
  pull_request:
    branches: [main]

jobs:
  build_ios:
    name: Preview build iOS
    type: build
    params:
      platform: ios
      profile: preview

  build_android:
    name: Preview build Android
    type: build
    params:
      platform: android
      profile: preview

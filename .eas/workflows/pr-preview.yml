name: PR preview build

# Opening a PR against preview produces an internal-distribution build for the
# native changes in that PR. JS/asset-only changes ship via OTA on push to
# preview instead — so only open a PR here when you have native changes.
on:
  pull_request:
    branches: [preview]

jobs:
  build_ios:
    name: Preview build iOS
    type: build
    params:
      platform: ios
      profile: preview

  build_android:
    name: Preview build Android
    type: build
    params:
      platform: android
      profile: preview

name: Preview update

# JS/asset-only changes ship over-the-air to preview builds on every push (merge)
# to preview, so testers don't wait on a rebuild. EAS filters by runtimeVersion,
# so only compatible installed preview builds receive them — native changes need
# a fresh preview build (open a PR against preview).
on:
  push:
    branches: [preview]

jobs:
  publish:
    name: OTA to preview
    type: update
    environment: preview
    params:
      branch: preview
      platform: all
      message: ${{ github.sha }}

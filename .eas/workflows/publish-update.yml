name: Publish update

# JS/asset-only changes ship over-the-air on every merge to main. EAS filters
# updates by runtimeVersion, so only compatible installed builds receive them.
on:
  push:
    branches: [main]

jobs:
  publish:
    name: OTA to production
    type: update
    environment: production
    params:
      branch: production
      platform: all
      message: ${{ github.sha }}
